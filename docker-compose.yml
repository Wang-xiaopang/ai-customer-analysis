# AI客户分析助手 — Production Docker Compose
#
# 启动:  docker compose up -d
# 查看:  docker compose ps
# 日志:  docker compose logs -f
# 停止:  docker compose down

services:
  db:
    image: registry.cn-hangzhou.aliyuncs.com/library/mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-customer_analysis}
      MYSQL_USER: ${DB_USER:-customer_analysis}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+aiomysql://${DB_USER:-customer_analysis}:${DB_PASSWORD}@db:3306/${DB_NAME:-customer_analysis}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysqldata:
