# ai-customer-analysis/docker-compose.dev.yml

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: customer_analysis
      MYSQL_USER: customer_analysis
      MYSQL_PASSWORD: customer_analysis_dev
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
